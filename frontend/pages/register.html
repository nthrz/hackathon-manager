<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HackManager</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>HackManager</h1>
    <h2 data-i18n="createAccount">Create account</h2>
    <form id="register-form">
      <label for="name" data-i18n="name">Name</label>
      <input type="text" id="name" required />
      <label for="email" data-i18n="email">Email</label>
      <input type="email" id="email" required />
      <label for="password" data-i18n="password">Password</label>
      <input type="password" id="password" required />
      <label for="password2" data-i18n="confirmPassword">Confirm Password</label>
      <input type="password" id="password2" required />
      <button type="submit" data-i18n="registerBtn">Register</button>
    </form>
    <p>
      <span data-i18n="alreadyAccount">Already have an account?</span>
      <a href="login.html" data-i18n="signInLink">Sign in</a>
    </p>
    <p id="error-msg" class="error hidden"></p>
    <div class="lang-toggle">
      <button id="btn-lang" class="btn-lang">EN</button>
    </div>
  </div>
  <script src="../js/i18n.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/register.js"></script>
</body>
</html>

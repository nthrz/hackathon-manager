<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HackManager</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <nav class="navbar">
    <a href="hackathons.html" class="nav-brand">HackManager</a>
    <div class="nav-links">
      <span id="nav-user"></span>
      <button id="btn-lang" class="btn-lang">EN</button>
      <button id="btn-logout" data-i18n="logout">Logout</button>
    </div>
  </nav>

  <main class="container">
    <div id="team-info" class="card">
      <a id="back-link" href="hackathons.html" class="back-link" data-i18n="backToHackathon">← Back to hackathon</a>
      <h2 id="t-name"></h2>
      <p id="t-desc"></p>
      <p id="t-leader" class="muted"></p>
      <button id="btn-join" class="btn-primary hidden" data-i18n="joinTeam">Join Team</button>
    </div>

    <div class="two-col">
      <section>
        <div class="page-header">
          <h3 data-i18n="tasks">Tasks</h3>
          <button id="btn-create-task" class="btn-primary hidden" data-i18n="newTask">+ New Task</button>
        </div>

        <div id="create-task-form" class="card hidden">
          <h4 data-i18n="createTask">Create a Task</h4>
          <form id="task-form">
            <label data-i18n="title">Title</label>
            <input type="text" id="task-title" required />
            <label data-i18n="description">Description</label>
            <textarea id="task-desc"></textarea>
            <button type="submit" data-i18n="create">Create</button>
            <button type="button" id="btn-cancel-task" data-i18n="cancel">Cancel</button>
          </form>
        </div>

        <div id="task-list"></div>
      </section>

      <section>
        <h3 data-i18n="members">Members</h3>
        <div id="member-list" class="card"></div>
      </section>
    </div>
  </main>

  <script src="../js/i18n.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/team.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HackManager</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <nav class="navbar">
    <a href="hackathons.html" class="nav-brand">HackManager</a>
    <div class="nav-links">
      <span id="nav-user"></span>
      <button id="btn-lang" class="btn-lang">EN</button>
      <button id="btn-logout" data-i18n="logout">Logout</button>
    </div>
  </nav>

  <main class="container">
    <div id="hackathon-info" class="card">
      <h2 id="h-title"></h2>
      <p id="h-desc"></p>
      <p id="h-dates" class="muted"></p>
      <p id="h-owner" class="muted"></p>
      <button id="btn-join" class="btn-primary hidden" data-i18n="joinHackathon">Join Hackathon</button>
      <span id="member-badge" class="badge badge-done hidden" data-i18n="memberBadge">✓ You are a member</span>
    </div>

    <div class="page-header">
      <h3 data-i18n="teams">Teams</h3>
      <button id="btn-create-team" class="btn-primary hidden" data-i18n="newTeam">+ New Team</button>
    </div>

    <div id="create-team-form" class="card hidden">
      <h4 data-i18n="createTeam">Create a Team</h4>
      <form id="team-form">
        <label data-i18n="name">Name</label>
        <input type="text" id="t-name" required />
        <label data-i18n="description">Description</label>
        <textarea id="t-desc"></textarea>
        <button type="submit" data-i18n="create">Create</button>
        <button type="button" id="btn-cancel-team" data-i18n="cancel">Cancel</button>
      </form>
    </div>

    <div id="team-list" class="card-grid"></div>
  </main>

  <script src="../js/i18n.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/hackathon.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HackManager</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>HackManager</h1>
    <h2 data-i18n="signIn">Sign in</h2>
    <form id="login-form">
      <label for="email" data-i18n="email">Email</label>
      <input type="email" id="email" required />
      <label for="password" data-i18n="password">Password</label>
      <input type="password" id="password" required />
      <button type="submit" data-i18n="signInBtn">Sign in</button>
    </form>
    <p>
      <span data-i18n="noAccount">No account?</span>
      <a href="register.html" data-i18n="registerLink">Register</a>
    </p>
    <p id="error-msg" class="error hidden"></p>
    <div class="lang-toggle">
      <button id="btn-lang" class="btn-lang">EN</button>
    </div>
  </div>
  <script src="../js/i18n.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
